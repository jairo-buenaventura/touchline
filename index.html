<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Touchline</title>
<style>
  * {
    box-sizing: border-box;
  }
  body {
    font-family: -apple-system, sans-serif;
    background: #f5f5f3;
    color: #1a1a1a;
    margin: 0;
    padding: 1.5rem;
  }
  .layout {
    display: flex;
    gap: 1rem;
    max-width: 1200px;
    margin: 0 auto;
  }

  .col-izquierda {
    width: 220px;
    flex-shrink: 0;
  }
  .logo {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 1.5rem;
  }
  .seccion-titulo {
    font-size: 11px;
    text-transform: uppercase;
    color: #999;
    margin: 1.25rem 0 0.5rem;
    letter-spacing: 0.05em;
  }
  .control-grupo {
    margin-bottom: 0.75rem;
  }
  select {
    width: 100%;
    background: white;
    color: #1a1a1a;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 13px;
  }

  .col-central {
    width: 280px;
    flex-shrink: 0;
    background: white;
    border: 1px solid #e5e5e3;
    border-radius: 10px;
    padding: 1.25rem;
  }
  .marcador-equipos {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.25rem;
  }
  .marcador-equipos .nombre {
    font-size: 13px;
    font-weight: 600;
    max-width: 90px;
  }
  .marcador-equipos .numero {
    font-size: 28px;
    font-weight: 700;
  }
  .estadio-linea {
    font-size: 11px;
    color: #999;
    text-align: center;
    margin-bottom: 1.25rem;
  }
  .stat-fila {
    margin-bottom: 0.9rem;
  }
  .stat-valores {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .stat-nombre {
    font-size: 10px;
    text-transform: uppercase;
    color: #999;
    text-align: center;
    margin-bottom: 4px;
    letter-spacing: 0.04em;
  }
  .stat-barra {
    display: flex;
    height: 5px;
    border-radius: 3px;
    overflow: hidden;
    background: #eee;
  }
  .stat-barra-home {
    background: #1a1a1a;
  }
  .stat-barra-away {
    background: #ccc;
  }
  .goles-lista {
    margin-top: 1.25rem;
    border-top: 1px solid #eee;
    padding-top: 0.9rem;
  }
  .gol-item {
    font-size: 12px;
    display: flex;
    justify-content: space-between;
    padding: 3px 0;
    color: #555;
  }

  .col-derecha {
    flex: 1;
    background: white;
    border: 1px solid #e5e5e3;
    border-radius: 10px;
    padding: 1.25rem;
  }
  .tabs {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
    border-bottom: 1px solid #eee;
  }
  .tab {
    font-size: 12px;
    padding: 6px 12px;
    color: #999;
    border-bottom: 2px solid transparent;
  }
  .tab.activo {
    color: #1a1a1a;
    border-bottom-color: #1a1a1a;
    font-weight: 600;
  }
  #info {
    color: #888;
    font-size: 12px;
    margin-bottom: 0.75rem;
  }
  svg {
    background: #f7f6f3;
    border-radius: 8px;
    width: 100%;
    height: auto;
  }
  .linea-cancha {
    fill: none;
    stroke: rgba(40,40,40,0.18);
    stroke-width: 1;
  }
  .nombre-jugador {
    font-size: 7.5px;
    fill: white;
    font-weight: 500;
  }
</style>
</head>
<body>

  <div class="layout">

    <div class="col-izquierda">
      <div class="logo">⚽ Touchline</div>

      <div class="seccion-titulo">Partido</div>
      <div class="control-grupo">
        <select id="selector-partido"></select>
      </div>

      <div class="seccion-titulo">Equipo</div>
      <div class="control-grupo">
        <select id="selector-equipo">
          <option value="home">Local</option>
          <option value="away">Visitante</option>
        </select>
      </div>
    </div>

    <div class="col-central">
      <div class="marcador-equipos">
        <div class="nombre" id="nombre-home">-</div>
        <div class="numero" id="marcador-numero">- : -</div>
        <div class="nombre" id="nombre-away" style="text-align:right;">-</div>
      </div>
      <div class="estadio-linea" id="estadio-linea">-</div>

      <div id="bloque-estadisticas"></div>

      <div class="goles-lista" id="bloque-goles"></div>
    </div>

    <div class="col-derecha">
      <div class="tabs">
        <div class="tab activo" id="tab-passing" onclick="cambiarVista('passing')">Passing network</div>
        <div class="tab" id="tab-shots" onclick="cambiarVista('shots')">Shots map</div>
        <div class="tab" id="tab-action" onclick="cambiarVista('action')">Action map</div>
      </div>
      <div id="selector-jugador-contenedor" style="display:none; margin-bottom:0.75rem;">
        <select id="selector-jugador"></select>
      </div>
      <p id="info">Cargando...</p>
      <svg id="cancha" viewBox="0 0 380 580"></svg>
    </div>

  </div>

  <script>
    const PITCH_X0 = 20, PITCH_X1 = 360, PITCH_Y0 = 20, PITCH_Y1 = 500;
    const ANCHO = PITCH_X1 - PITCH_X0;
    const LARGO = PITCH_Y1 - PITCH_Y0;

    function aCancha(px, py) {
      const cx = PITCH_X0 + (py / 100) * ANCHO;
      const cy = PITCH_Y1 - (px / 100) * LARGO;
      return [cx, cy];
    }

    function apellido(nombreCompleto) {
      const partes = nombreCompleto.trim().split(" ");
      return partes.slice(1).join(" ") || partes[0];
    }

    function dibujarLineasCancha() {
      let html = '';
      html += `<rect class="linea-cancha" x="${PITCH_X0}" y="${PITCH_Y0}" width="${ANCHO}" height="${LARGO}"/>`;
      const mitadY = PITCH_Y0 + LARGO / 2;
      html += `<line class="linea-cancha" x1="${PITCH_X0}" y1="${mitadY}" x2="${PITCH_X1}" y2="${mitadY}"/>`;
      const centroX = PITCH_X0 + ANCHO / 2;
      html += `<circle class="linea-cancha" cx="${centroX}" cy="${mitadY}" r="${ANCHO * 0.18}"/>`;
      html += `<circle cx="${centroX}" cy="${mitadY}" r="1.5" fill="rgba(40,40,40,0.18)"/>`;

      const areaAncho = ANCHO * 0.6;
      const areaLargoArriba = LARGO * 0.16;
      const areaLargoAbajo = LARGO * 0.16;
      const areaX = centroX - areaAncho / 2;
      const cajaAncho = ANCHO * 0.3;
      const cajaLargo = LARGO * 0.06;
      const cajaX = centroX - cajaAncho / 2;

      html += `<rect class="linea-cancha" x="${areaX}" y="${PITCH_Y0}" width="${areaAncho}" height="${areaLargoArriba}"/>`;
      html += `<rect class="linea-cancha" x="${cajaX}" y="${PITCH_Y0}" width="${cajaAncho}" height="${cajaLargo}"/>`;
      html += `<circle cx="${centroX}" cy="${PITCH_Y0 + areaLargoArriba * 0.7}" r="1.5" fill="rgba(40,40,40,0.18)"/>`;
      html += `<path class="linea-cancha" d="M ${areaX + areaAncho * 0.18} ${PITCH_Y0 + areaLargoArriba} A ${ANCHO * 0.16} ${ANCHO * 0.16} 0 0 0 ${areaX + areaAncho * 0.82} ${PITCH_Y0 + areaLargoArriba}"/>`;

      html += `<rect class="linea-cancha" x="${areaX}" y="${PITCH_Y1 - areaLargoAbajo}" width="${areaAncho}" height="${areaLargoAbajo}"/>`;
      html += `<rect class="linea-cancha" x="${cajaX}" y="${PITCH_Y1 - cajaLargo}" width="${cajaAncho}" height="${cajaLargo}"/>`;
      html += `<circle cx="${centroX}" cy="${PITCH_Y1 - areaLargoAbajo * 0.7}" r="1.5" fill="rgba(40,40,40,0.18)"/>`;
      html += `<path class="linea-cancha" d="M ${areaX + areaAncho * 0.18} ${PITCH_Y1 - areaLargoAbajo} A ${ANCHO * 0.16} ${ANCHO * 0.16} 0 0 1 ${areaX + areaAncho * 0.82} ${PITCH_Y1 - areaLargoAbajo}"/>`;

      return html;
    }

    let datosPartidoActual = null;
    let vistaActual = 'passing';

    function cambiarVista(vista) {
      vistaActual = vista;
      document.getElementById('tab-passing').classList.toggle('activo', vista === 'passing');
      document.getElementById('tab-shots').classList.toggle('activo', vista === 'shots');
      document.getElementById('tab-action').classList.toggle('activo', vista === 'action');
      document.getElementById('selector-jugador-contenedor').style.display = vista === 'action' ? 'block' : 'none';
      if (datosPartidoActual) {
        const lado = document.getElementById('selector-equipo').value;
        if (vista === 'action') poblarSelectorJugador(datosPartidoActual, lado);
        dibujarVistaActual(datosPartidoActual, lado);
      }
    }

    function poblarSelectorJugador(datos, lado) {
      const equipo = datos[lado];
      const selector = document.getElementById('selector-jugador');
      const valorAnterior = selector.value;
      selector.innerHTML = '';
      (equipo.acciones || []).forEach(j => {
        const opcion = document.createElement('option');
        opcion.value = j.id;
        opcion.textContent = j.nombre;
        selector.appendChild(opcion);
      });
      if (valorAnterior && (equipo.acciones || []).some(j => String(j.id) === valorAnterior)) {
        selector.value = valorAnterior;
      }
      selector.onchange = () => dibujarVistaActual(datosPartidoActual, document.getElementById('selector-equipo').value);
    }

    function dibujarVistaActual(datos, lado) {
      if (vistaActual === 'passing') {
        dibujarCancha(datos, lado);
      } else if (vistaActual === 'shots') {
        dibujarShotsMap(datos, lado);
      } else {
        dibujarActionMap(datos, lado);
      }
    }

    async function cargarLista() {
      const respuesta = await fetch('data/lista.json');
      const lista = await respuesta.json();

      const selectorPartido = document.getElementById('selector-partido');
      selectorPartido.innerHTML = '';
      lista.forEach(partido => {
        const opcion = document.createElement('option');
        opcion.value = partido.archivo;
        opcion.textContent = `${partido.home} ${partido.marcador} ${partido.away}`;
        selectorPartido.appendChild(opcion);
      });

      selectorPartido.addEventListener('change', () => cargarPartido(selectorPartido.value));

      const selectorEquipo = document.getElementById('selector-equipo');
      selectorEquipo.addEventListener('change', () => {
        if (datosPartidoActual) {
          actualizarTodo(datosPartidoActual, selectorEquipo.value);
        }
      });

      if (lista.length > 0) {
        cargarPartido(lista[0].archivo);
      } else {
        document.getElementById('info').textContent = 'No hay partidos en data/lista.json todavia.';
      }
    }

    async function cargarPartido(nombreArchivo) {
      document.getElementById('info').textContent = 'Cargando partido...';
      const respuesta = await fetch('data/' + nombreArchivo);
      const datos = await respuesta.json();
      datosPartidoActual = datos;
      const ladoElegido = document.getElementById('selector-equipo').value;
      actualizarTodo(datos, ladoElegido);
    }

    function actualizarTodo(datos, lado) {
      actualizarMarcador(datos);
      actualizarEstadisticas(datos);
      actualizarGoles(datos);
      dibujarVistaActual(datos, lado);
    }

    function actualizarMarcador(datos) {
      document.getElementById('nombre-home').textContent = datos.home.equipo;
      document.getElementById('nombre-away').textContent = datos.away.equipo;
      document.getElementById('marcador-numero').textContent = datos.marcador;
      document.getElementById('estadio-linea').textContent = datos.estadio || '';
    }

    function filaEstadistica(nombre, valorHome, valorAway, sufijo, maxValor) {
      const total = maxValor !== undefined ? maxValor : (valorHome + valorAway || 1);
      const pctHome = Math.round((valorHome / total) * 100);
      const pctAway = 100 - pctHome;
      return `
        <div class="stat-fila">
          <div class="stat-valores">
            <span>${valorHome}${sufijo || ''}</span>
            <span>${valorAway}${sufijo || ''}</span>
          </div>
          <div class="stat-nombre">${nombre}</div>
          <div class="stat-barra">
            <div class="stat-barra-home" style="width:${pctHome}%"></div>
            <div class="stat-barra-away" style="width:${pctAway}%"></div>
          </div>
        </div>
      `;
    }

    function actualizarEstadisticas(datos) {
      const h = datos.home.estadisticas;
      const a = datos.away.estadisticas;
      const bloque = document.getElementById('bloque-estadisticas');

      bloque.innerHTML =
        filaEstadistica('Posesion', h.posesion, a.posesion, '%', 100) +
        filaEstadistica('Tiros', h.tiros, a.tiros) +
        filaEstadistica('Tiros al arco', h.tiros_al_arco, a.tiros_al_arco) +
        filaEstadistica('Pases', h.pases_totales, a.pases_totales) +
        filaEstadistica('Precision de pases', h.precision_pases, a.precision_pases, '%', 100);
    }

    function actualizarGoles(datos) {
      const bloque = document.getElementById('bloque-goles');
      const golesHome = datos.home.estadisticas.goles.map(g => Object.assign({}, g, {equipo: datos.home.equipo}));
      const golesAway = datos.away.estadisticas.goles.map(g => Object.assign({}, g, {equipo: datos.away.equipo}));
      const todos = golesHome.concat(golesAway).sort((a, b) => a.minuto - b.minuto);

      if (todos.length === 0) {
        bloque.innerHTML = '<div class="gol-item">Sin goles en este partido</div>';
        return;
      }

      bloque.innerHTML = todos.map(g =>
        `<div class="gol-item"><span>${g.minuto}' ${g.jugador}</span><span>${g.equipo}</span></div>`
      ).join('');
    }

    function dibujarCancha(datos, lado) {
      const equipo = datos[lado];
      document.getElementById('info').textContent = `${equipo.equipo} — red de pases`;

      const svg = document.getElementById('cancha');
      let html = dibujarLineasCancha();

      const maxToques = Math.max(...equipo.jugadores.map(j => j.toques));
      const radioMinimo = 20;
      const radioMaximo = 27;

      const posicionesPorId = {};
      equipo.jugadores.forEach(j => {
        const [cx, cy] = aCancha(j.x, 100 - j.y);
        const radio = radioMinimo + (j.toques / maxToques) * (radioMaximo - radioMinimo);
        posicionesPorId[j.id] = { jugador: j, cx, cy, radio };
      });
      const posiciones = Object.values(posicionesPorId);

      for (let vuelta = 0; vuelta < 30; vuelta++) {
        for (let i = 0; i < posiciones.length; i++) {
          for (let k = i + 1; k < posiciones.length; k++) {
            const a = posiciones[i];
            const b = posiciones[k];
            const dx = b.cx - a.cx;
            const dy = b.cy - a.cy;
            const distancia = Math.hypot(dx, dy) || 0.01;
            const minimaDistancia = a.radio + b.radio + 2;
            if (distancia < minimaDistancia) {
              const sobra = (minimaDistancia - distancia) / 2;
              const ux = dx / distancia;
              const uy = dy / distancia;
              a.cx -= ux * sobra;
              a.cy -= uy * sobra;
              b.cx += ux * sobra;
              b.cy += uy * sobra;
            }
          }
        }
      }

      equipo.pases.forEach(p => {
        if (p.veces < 5) return;
        const a = posicionesPorId[p.de];
        const b = posicionesPorId[p.a];
        if (!a || !b) return;
        const grosor = Math.max(0.5, p.veces / 6);
        html += `<line x1="${a.cx.toFixed(1)}" y1="${a.cy.toFixed(1)}" x2="${b.cx.toFixed(1)}" y2="${b.cy.toFixed(1)}" stroke="#8a9bb0" stroke-width="${grosor}" opacity="0.8"/>`;
      });

      posiciones.forEach(p => {
        const cx = p.cx, cy = p.cy, radio = p.radio, j = p.jugador;
        html += `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="${radio.toFixed(1)}" fill="#1a1a1a" stroke="white" stroke-width="1.5"/>`;
        html += `<text class="nombre-jugador" x="${cx.toFixed(1)}" y="${cy.toFixed(1)}" text-anchor="middle" dominant-baseline="central">${apellido(j.nombre)}</text>`;
      });

      svg.innerHTML = html;
    }

    function dibujarShotsMap(datos, lado) {
      const equipo = datos[lado];
      const tiros = equipo.tiros || [];
      document.getElementById('info').textContent = `${equipo.equipo} — ${tiros.length} tiro(s)`;

      const colorPorResultado = {
        Goal: '#1a7a3c',
        SavedShot: '#3478F6',
        MissedShots: '#bbb',
        ShotOnPost: '#d99a1f',
      };

      const svg = document.getElementById('cancha');
      let html = dibujarLineasCancha();

      tiros.forEach(t => {
        if (t.x == null || t.y == null) return;
        const [cx, cy] = aCancha(t.x, 100 - t.y);
        const color = colorPorResultado[t.resultado] || '#999';
        const radio = t.resultado === 'Goal' ? 6 : 4.5;
        html += `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="${radio}" fill="${color}" stroke="white" stroke-width="1" opacity="0.9"/>`;
      });

      svg.innerHTML = html;
    }

    function dibujarActionMap(datos, lado) {
      const equipo = datos[lado];
      const acciones = equipo.acciones || [];
      const selector = document.getElementById('selector-jugador');
      const pidElegido = selector.value;
      const jugador = acciones.find(j => String(j.id) === pidElegido) || acciones[0];

      const svg = document.getElementById('cancha');
      let html = dibujarLineasCancha();

      if (!jugador) {
        document.getElementById('info').textContent = `${equipo.equipo} — sin acciones registradas`;
        svg.innerHTML = html;
        return;
      }

      document.getElementById('info').textContent = `${jugador.nombre} — ${jugador.acciones.length} accion(es)`;

      const colorPorTipo = {
        TakeOn: '#3478F6',
        BallRecovery: '#1a7a3c',
        Interception: '#1a7a3c',
        Tackle: '#1a7a3c',
        Foul: '#c0392b',
        Aerial: '#8a9bb0',
        Clearance: '#8a9bb0',
        BlockedPass: '#8a9bb0',
        Dispossessed: '#c0392b',
        Challenge: '#8a9bb0',
      };

      jugador.acciones.forEach(a => {
        const [cx, cy] = aCancha(a.x, 100 - a.y);
        const color = colorPorTipo[a.tipo] || '#999';
        html += `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="4.5" fill="${color}" stroke="white" stroke-width="1" opacity="${a.exitoso ? 0.9 : 0.5}"/>`;
      });

      svg.innerHTML = html;
    }

    cargarLista().catch(err => {
      document.getElementById('info').textContent = 'Error cargando los datos: ' + err.message;
    });
  </script>

</body>
</html>
