      - generic [ref=f19e699]:
        - generic [ref=f19e700]: Sobre Footylogos.com
        - generic [ref=f19e701]: "Footylogos.com está creado por aficionados al fútbol para personas que diseñan, coleccionan, analizan y simplemente aman los escudos de fútbol. Estamos construyendo la biblioteca más grande y precisa de escudos de clubes, emblemas de selecciones nacionales y logotipos de ligas y torneos, todos descargables en PNG y SVG limpios, con fondo transparente.Explora tanto equipos históricos como joyas ocultas, desde las grandes ligas europeas hasta equipos de base en África, Asia y las Américas: de Islandia a Indonesia, pasando por Perú y mucho más. Cada página está pensada para una consulta rápida y un uso fiable: nombres consistentes, archivos vectoriales/SVG cuando existen, PNG optimizados y variantes (escudo principal, versión monocroma, escudos aniversario, wordmarks y iconos).Puedes usar estos logos para media kits, proyectos de aficionados, informes de scouting, ligas fantasy o trabajos de investigación. Nuestro objetivo es ser la base de datos de escudos de fútbol más completa de la web, actualizada de forma continua a medida que los clubes se rebrandan y las competiciones evolucionan. Los logotipos se ofrecen con fines de identificación y uso editorial/de referencia; las marcas registradas pertenecen a sus respectivos propietarios. Si detectas un archivo desactualizado o un equipo que falta, avísanos y lo corregiremos rápidamente."
