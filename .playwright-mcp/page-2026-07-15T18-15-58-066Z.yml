      - generic [ref=f13e190]:
        - heading "Significado y origen del escudo de Bayern Múnich" [level=2] [ref=f13e192]
        - generic [ref=f13e196]:
          - paragraph [ref=f13e197]: El escudo del Bayern de Múnich es un escudo circular con un anillo exterior rojo que lleva la inscripción «FC BAYERN MÜNCHEN» y encierra un campo de rombos azules y blancos tomados de la bandera bávara.
          - paragraph [ref=f13e198]: "Los diamantes son el elemento clave: provienen directamente de las armas del Estado Libre de Baviera, lo que convierte el logotipo en una declaración de orgullo regional tanto como de identidad del club."
          - paragraph [ref=f13e199]: Los emblemas anteriores utilizaban solo un monograma «FCBM» entrelazado y, más tarde, simples escudos azules o rojos antes de que los colores bávaros se añadieran al escudo en la década de 1950 y se refinaran gradualmente hasta convertirse en el redondeado limpio de hoy.
          - paragraph [ref=f13e200]: Los ajustes recientes, incluido el rediseño de 2017 y el sutil ajuste de color en 2024, han modernizado las proporciones de la insignia, manteniendo el mismo inconfundible núcleo bávaro.
          - paragraph [ref=f13e201]: "--"
          - paragraph [ref=f13e202]: "Acerca del Bayern de Múnich: el Bayern de Múnich es un club de fútbol profesional de Alemania que compite en la Bundesliga. Esta página contiene el escudo principal y el icono de las redes sociales (SVG y PNG) con fondos transparentes para uso editorial o de referencia. Para conocer las reglas oficiales de la marca, consulta el sitio oficial del club. El escudo del Bayern de Múnich y las marcas relacionadas son marcas comerciales de sus respectivos propietarios; los archivos de logotipos de alta calidad se encuentran en la parte superior de esta página."
